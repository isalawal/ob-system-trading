<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BTC/USD Live</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0c10;color:#c8d0e0;font-family:monospace;min-height:100vh;overflow-x:hidden}
#hdr{background:#0d1017;border-bottom:1px solid #1a2030;padding:8px 14px;display:flex;justify-content:space-between;align-items:center}
.logo{color:#ffd740;font-size:14px;font-weight:bold;letter-spacing:1px}
#price{color:#00e676;font-size:22px;font-weight:bold;font-family:monospace}
#status{color:#00e676;font-size:10px;padding:2px 14px;background:#080a0e;border-bottom:1px solid #1a2030;letter-spacing:0.5px}
.main-row{display:grid;grid-template-columns:1fr 220px;gap:5px;padding:5px;height:500px}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:0 5px 5px;height:180px}
.c{background:#0d1017;border:1px solid #1a2030;border-radius:3px;overflow:hidden}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo">◈ BTC/USD · COINBASE · 1HR</div>
  <div id="price">--</div>
</div>
<div id="status">Initializing...</div>
<div class="main-row">
  <div class="c"><div id="main" style="height:100%"></div></div>
  <div class="c"><div id="dom"  style="height:100%"></div></div>
</div>
<div class="bottom-row">
  <div class="c"><div id="delta" style="height:100%"></div></div>
  <div class="c"><div id="cvd"   style="height:100%"></div></div>
  <div class="c"><div id="vol"   style="height:100%"></div></div>
</div>
<script>
const BG='#0a0c10',PN='#0d1017',BR='#1a2030',TX='#c8d0e0',GR='#3a4055';
const GN='rgba(0,230,118,1)',GT='rgba(0,230,118,0.25)';
const RD='rgba(255,23,68,1)', RT='rgba(255,23,68,0.25)';
const PU='rgba(179,136,255,1)';
const GO='rgba(255,215,64,1)',GT2='rgba(255,215,64,0.08)';
const OR='rgba(255,140,0,0.18)';

const base={
  paper_bgcolor:PN,plot_bgcolor:BG,
  font:{color:TX,size:10},
  margin:{l:60,r:15,t:25,b:35},
  showlegend:false,
  xaxis:{gridcolor:BR,zerolinecolor:BR,showgrid:true,color:TX},
  yaxis:{gridcolor:BR,zerolinecolor:BR,showgrid:true,color:TX}
};
const lyt=(t,e={})=>({...base,
  title:{text:t,font:{size:11,color:GR},x:0.01,y:0.97},...e});

const PROXY='https://corsproxy.io/?';
const BASE='https://api.exchange.coinbase.com';

async function get(path){
  const url=BASE+path;
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
    if(r.ok) return r.json();
  }catch(e){}
  const r=await fetch(PROXY+encodeURIComponent(url),
    {signal:AbortSignal.timeout(9000)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

let prevP=0;

function setStatus(msg,col='#00e676'){
  const el=document.getElementById('status');
  el.textContent=msg; el.style.color=col;
}

async function load(){
  try{
    setStatus('Fetching 1H candles...');

    const [rawC, rawT, rawB] = await Promise.allSettled([
      get('/products/BTC-USD/candles?granularity=3600&limit=80'),
      get('/products/BTC-USD/ticker'),
      get('/products/BTC-USD/book?level=2'),
    ]);

    if(rawC.status==='rejected') throw new Error('Candles failed: '+rawC.reason);

    const rows=Array.isArray(rawC.value)?rawC.value:rawC.value.candles;
    const C=rows.map(r=>({
      t:new Date(r[0]*1000),
      o:+r[3],h:+r[2],l:+r[1],c:+r[4],v:+r[5]
    })).sort((a,b)=>a.t-b.t);

    const cur = rawT.status==='fulfilled'
      ? +rawT.value.price
      : C[C.length-1].c;

    // price header
    const pel=document.getElementById('price');
    pel.textContent='$'+cur.toLocaleString('en-US',{minimumFractionDigits:2});
    pel.style.color=cur>=(prevP||cur)?GN:RD;
    prevP=cur;

    // ── VOLUME PROFILE (accurate TPO calculation)
    const lo=Math.min(...C.map(d=>d.l));
    const hi=Math.max(...C.map(d=>d.h));
    const BINS=40;
    const bh=(hi-lo)/BINS;
    const centers=Array.from({length:BINS},(_,i)=>lo+(i+0.5)*bh);
    const vpVols=new Array(BINS).fill(0);
    C.forEach(d=>{
      const candleRange=d.h-d.l||0.01;
      centers.forEach((cv,i)=>{
        if(cv>=d.l && cv<=d.h){
          // weight by how centered this price is in the candle
          const overlap=Math.min(d.h,centers[i]+bh/2)-Math.max(d.l,centers[i]-bh/2);
          vpVols[i]+=d.v*(overlap/candleRange);
        }
      });
    });
    const vpMax=Math.max(...vpVols)||1;

    // POC = highest volume price level
    const pocIdx=vpVols.indexOf(vpMax);
    const poc=centers[pocIdx];

    // Value Area = 70% of total volume around POC
    const totalVol=vpVols.reduce((s,v)=>s+v,0);
    let vaVol=vpVols[pocIdx],vaLo=pocIdx,vaHi=pocIdx;
    while(vaVol<totalVol*0.70){
      const up  =vaHi+1<BINS  ?vpVols[vaHi+1]:0;
      const down=vaLo-1>=0    ?vpVols[vaLo-1]:0;
      if(up>=down && vaHi+1<BINS) vaHi++;
      else if(vaLo-1>=0) vaLo--;
      else break;
      vaVol=vpVols.slice(vaLo,vaHi+1).reduce((s,v)=>s+v,0);
    }
    const vaLoPrice=centers[vaLo];
    const vaHiPrice=centers[vaHi];

    // ── BUBBLES (accurate: show all candles, size by volume z-score)
    const avgVol=C.reduce((s,d)=>s+d.v,0)/C.length;
    const stdVol=Math.sqrt(C.reduce((s,d)=>s+(d.v-avgVol)**2,0)/C.length)||1;
    // show bubbles for candles with volume > 0.5 std above mean
    const significant=C.filter(d=>d.v>avgVol+0.5*stdVol);
    const buys =significant.filter(d=>d.c>=d.o);
    const sells=significant.filter(d=>d.c<d.o);
    const priceRange=hi-lo||1;
    // bubble size: normalize 0-50px based on volume z-score
    const bubSize=d=>Math.min(50,Math.max(6,
      8+((d.v-avgVol)/stdVol)*10));

    // ── VWAP
    let ct=0,cvo=0;
    const vwap=C.map(d=>{
      ct+=((d.h+d.l+d.c)/3)*d.v;
      cvo+=d.v;
      return ct/cvo;
    });

    // ── DELTA per candle
    const dv=C.map(d=>+(d.c-d.o).toFixed(2));

    // ── CVD cumulative
    let run=0;
    const cvdY=C.map(d=>{run+=d.c-d.o;return +run.toFixed(2);});
    const cvdLast=cvdY[cvdY.length-1];

    setStatus('Rendering...');

    // ── VOLUME PROFILE horizontal bars (attached to right of chart)
    // Normalize VP width to fit in xaxis2 domain [0,1]
    const vpTraces=centers.map((price,i)=>({
      type:'bar',
      x:[vpVols[i]],
      y:[price],
      orientation:'h',
      width:bh*0.85,
      xaxis:'x2',
      yaxis:'y',
      showlegend:false,
      hoverinfo:'skip',
      marker:{
        color:i===pocIdx
          ?'rgba(255,140,0,0.95)'  // POC = orange
          :(price>=vaLoPrice&&price<=vaHiPrice
            ?`rgba(255,215,64,${(0.3+0.65*vpVols[i]/vpMax).toFixed(2)})`  // VA = gold
            :`rgba(255,215,64,${(0.08+0.25*vpVols[i]/vpMax).toFixed(2)})`), // outside = dim
      },
    }));

    const mainTraces=[
      // Value area background
      {type:'scatter',
       x:[C[0].t,C[C.length-1].t,C[C.length-1].t,C[0].t,C[0].t],
       y:[vaHiPrice,vaHiPrice,vaLoPrice,vaLoPrice,vaHiPrice],
       fill:'toself',fillcolor:OR,
       line:{color:'rgba(255,140,0,0.5)',width:1},
       mode:'lines',hoverinfo:'skip'},
      // POC line
      {type:'scatter',
       x:[C[0].t,C[C.length-1].t],
       y:[poc,poc],
       mode:'lines',
       line:{color:'rgba(255,160,0,1)',width:1.5,dash:'dot'},
       hoverinfo:'skip'},
      // Candlesticks
      {type:'candlestick',
       x:C.map(d=>d.t),
       open:C.map(d=>d.o),high:C.map(d=>d.h),
       low:C.map(d=>d.l),close:C.map(d=>d.c),
       increasing:{line:{color:GN,width:1},fillcolor:'rgba(0,230,118,0.12)'},
       decreasing:{line:{color:RD,width:1},fillcolor:'rgba(255,23,68,0.12)'},
       whiskerwidth:0.4},
      // VWAP
      {type:'scatter',
       x:C.map(d=>d.t),y:vwap,
       mode:'lines',
       line:{color:PU,width:1.5,dash:'dot'},
       hovertemplate:'VWAP: %{y:.2f}<extra></extra>'},
      // Volume bars (secondary y)
      {type:'bar',
       x:C.map(d=>d.t),y:C.map(d=>d.v),
       marker:{color:C.map(d=>d.c>=d.o?GT:RT)},
       yaxis:'y2',hoverinfo:'skip'},
      // BUY bubbles
      {type:'scatter',
       x:buys.map(d=>d.t),
       y:buys.map(d=>d.h+priceRange*0.004),
       mode:'markers',
       marker:{
         color:GN,
         size:buys.map(d=>bubSize(d)),
         opacity:0.88,
         line:{color:'rgba(0,255,100,0.2)',width:1}
       },
       hovertemplate:'BUY<br>Vol: %{customdata:.2f}<br>Price: %{y:.2f}<extra></extra>',
       customdata:buys.map(d=>d.v)},
      // SELL bubbles
      {type:'scatter',
       x:sells.map(d=>d.t),
       y:sells.map(d=>d.l-priceRange*0.004),
       mode:'markers',
       marker:{
         color:RD,
         size:sells.map(d=>bubSize(d)),
         opacity:0.88,
         line:{color:'rgba(255,23,68,0.2)',width:1}
       },
       hovertemplate:'SELL<br>Vol: %{customdata:.2f}<br>Price: %{y:.2f}<extra></extra>',
       customdata:sells.map(d=>d.v)},
    ];

    Plotly.react('main',
      [...mainTraces,...vpTraces],
      {
        ...lyt(''),
        xaxis:{
          ...base.xaxis,type:'date',
          rangeslider:{visible:false},
          domain:[0,0.76],
        },
        xaxis2:{
          domain:[0.77,1.0],
          showgrid:false,showticklabels:false,
          zeroline:false,color:TX,
        },
        yaxis:{...base.yaxis,side:'right'},
        yaxis2:{
          overlaying:'y',side:'left',
          showgrid:false,showticklabels:false,
          range:[0,Math.max(...C.map(d=>d.v))*8],
        },
        annotations:[{
          x:0.77,y:poc,xref:'paper',yref:'y',
          text:`POC ${poc.toFixed(0)}`,
          showarrow:false,
          font:{color:'rgba(255,160,0,1)',size:9},
          xanchor:'left',
        }],
        showlegend:false,
      }
    );

    // ── DOM
    if(rawB.status==='fulfilled'){
      const book=rawB.value;
      const bids=book.bids.slice(0,25).map(x=>({p:+x[0],q:+x[1]}));
      const asks=book.asks.slice(0,25).map(x=>({p:+x[0],q:+x[1]}));
      const mq=Math.max(...bids.map(b=>b.q),...asks.map(a=>a.q))||1;
      Plotly.react('dom',[
        {type:'bar',
         x:bids.map(b=>b.q),y:bids.map(b=>b.p),
         orientation:'h',
         marker:{color:bids.map(b=>
           `rgba(0,230,118,${(0.15+0.8*b.q/mq).toFixed(2)})`)}},
        {type:'bar',
         x:asks.map(a=>-a.q),y:asks.map(a=>a.p),
         orientation:'h',
         marker:{color:asks.map(a=>
           `rgba(255,23,68,${(0.15+0.8*a.q/mq).toFixed(2)})`)}},
      ],lyt('DOM · Order Book',{
        barmode:'overlay',
        xaxis:{showticklabels:false,showgrid:false,
               zeroline:true,zerolinecolor:GO,zerolinewidth:1},
        yaxis:{...base.yaxis,side:'right'},
      }));
    }

    // ── DELTA
    Plotly.react('delta',[{
      type:'bar',x:C.map(d=>d.t),y:dv,
      marker:{color:dv.map(v=>v>=0?GN:RD)},
    }],lyt('Delta · Close − Open',{
      shapes:[{type:'line',
               x0:C[0].t,x1:C[C.length-1].t,
               y0:0,y1:0,
               line:{color:GR,width:1}}],
    }));

    // ── CVD
    Plotly.react('cvd',[{
      type:'scatter',
      x:C.map(d=>d.t),y:cvdY,
      mode:'lines',
      line:{color:cvdLast>=0?GN:RD,width:1.5},
      fill:'tozeroy',
      fillcolor:cvdLast>=0
        ?'rgba(0,230,118,0.15)'
        :'rgba(255,23,68,0.15)',
    }],lyt('CVD · Cumulative Delta'));

    // ── VOLUME
    Plotly.react('vol',[{
      type:'bar',
      x:C.map(d=>d.t),y:C.map(d=>d.v),
      marker:{color:C.map(d=>d.c>=d.o?GT:RT)},
    }],lyt('Volume · Per Candle',{
      yaxis:{...base.yaxis,side:'right'},
    }));

    setStatus(
      `✓ Live $${cur.toLocaleString()} · `+
      `POC: ${poc.toFixed(0)} · `+
      `VA: ${vaLoPrice.toFixed(0)}–${vaHiPrice.toFixed(0)} · `+
      `${new Date().toLocaleTimeString()} · 3s refresh`
    );

  }catch(e){
    setStatus('Error: '+e.message,'#ff1744');
    console.error(e);
  }
}

// initial load + fast refresh
load();
setInterval(load,3000);
</script>
</body>
</html>
