name: Gold 1H OB Monitor
on:
  schedule:
    - cron: '2 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install yfinance pandas numpy loguru
      - run: python check_ob_gold_1h.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
      - run: |
          if [ -f "data/live_signals_gold.csv" ]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add data/live_signals_gold.csv
            git diff --staged --quiet || git commit -m "log gold signal $(date -u)"
            git push
          else
            echo "⏳ No gold signal this hour"
          fi
